<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFix Admin - Complaint Detail</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/theme.js"></script>
  <style>
    .detail-page { max-width: 900px; }
    .detail-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 28px;
    }
    .detail-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .detail-header .meta { display: flex; gap: 12px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px;
    }
    .info-card {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 24px;
    }
    .info-card h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--card-border);
    }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--card-border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 0.88rem; color: var(--text-secondary); font-weight: 500; }
    .info-value { font-size: 0.92rem; font-weight: 600; text-align: right; }
    .description-box {
      background: var(--input-bg); border-radius: var(--radius-sm);
      padding: 18px; margin-top: 12px; font-size: 0.92rem; line-height: 1.7;
    }
    .assign-section {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    }
    .assign-section h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--card-border);
    }
    .assign-form { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .assign-form .form-group { flex: 1; min-width: 200px; margin-bottom: 0; }
    .assign-form .form-group label { margin-bottom: 6px; display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); }
    .assign-form select, .assign-form input {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      border: 2px solid var(--card-border); background: var(--input-bg);
      font-family: 'Inter'; font-size: 0.88rem; color: var(--text-primary);
      outline: none; transition: var(--transition);
    }
    .assign-form select:focus, .assign-form input:focus { border-color: var(--accent); }
    .assigned-officer {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.2); border-radius: var(--radius-sm);
    }
    .assigned-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
    }
    .assigned-info .name { font-weight: 700; font-size: 0.95rem; }
    .assigned-info .dept { font-size: 0.82rem; color: var(--text-secondary); }
    .timeline {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 24px;
    }
    .timeline h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--card-border);
    }
    .timeline-item {
      display: flex; gap: 14px; padding: 12px 0;
      border-bottom: 1px solid var(--card-border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-dot {
      width: 12px; height: 12px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .timeline-dot.orange { background: var(--accent); }
    .timeline-dot.blue { background: var(--info); }
    .timeline-dot.green { background: var(--success); }
    .timeline-content .event { font-size: 0.9rem; font-weight: 600; }
    .timeline-content .time { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
    .status-update-section {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
    }
    .status-update-section h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--card-border);
    }
    .status-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .status-btn {
      padding: 8px 20px; border-radius: var(--radius-sm); border: 2px solid var(--card-border);
      background: var(--card); font-family: 'Inter'; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: var(--transition);
    }
    .status-btn:hover { border-color: var(--accent); }
    .status-btn.active-status { border-color: var(--accent); background: rgba(249,115,22,0.1); color: var(--accent); }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">C</div><div class="sidebar-brand">City<span>Fix</span></div></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> Complaints</a>
        <a href="officers.html" class="sidebar-link"><span class="icon">👮</span> Officers</a>
        <a href="citizens.html" class="sidebar-link"><span class="icon">👥</span> Citizens</a>
        <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
        <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
      </nav>
      <div class="sidebar-footer"><a href="../auth.html" class="sidebar-link"><span class="icon">🚪</span> Logout</a></div>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left"><h1>Complaint Detail</h1><span class="breadcrumb" id="breadcrumb">Loading...</span></div>
        <div class="topbar-right">
          <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
          <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
            <div class="admin-avatar">AD</div>
            <div class="admin-info"><div class="name">Admin User</div><div class="role">Administrator</div></div>
            <div class="profile-dropdown" id="profile-dropdown"><a href="#">👤 My Profile</a><a href="../auth.html">🚪 Logout</a></div>
          </div>
        </div>
      </header>
      <div class="page-content detail-page" id="page-content">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
  <script src="../js/demo-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const complaintId = params.get('id');
    const complaint = DEMO_COMPLAINTS.find(c => c.id === complaintId);

    if (!complaint) {
      document.getElementById('page-content').innerHTML = `
        <div style="text-align:center;padding:80px 20px;">
          <div style="font-size:4rem;margin-bottom:16px;">🔍</div>
          <h2>Complaint Not Found</h2>
          <p style="color:var(--text-secondary);margin:8px 0 24px;">The complaint you're looking for doesn't exist.</p>
          <a href="complaints.html" class="btn btn-primary">← Back to Complaints</a>
        </div>`;
    } else {
      document.getElementById('breadcrumb').textContent = complaint.id + ' — ' + complaint.department;
      // Find assigned officer (simulate)
      const deptOfficers = DEMO_OFFICERS.filter(o => o.department === complaint.department);
      let assignedOfficer = complaint.status !== 'Pending' && deptOfficers.length > 0 ? deptOfficers[0] : null;

      function renderPage() {
        document.getElementById('page-content').innerHTML = `
          <a href="complaints.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Complaints</a>

          <div class="detail-header">
            <div>
              <h2>${complaint.title}</h2>
              <div class="meta">
                <span class="status-badge ${complaint.status.toLowerCase().replace(' ','-')}">${complaint.status}</span>
                <span class="priority-badge ${complaint.priority.toLowerCase()}">${complaint.priority}</span>
                <span style="font-size:0.85rem;color:var(--text-secondary);">📅 ${complaint.date}</span>
                <span style="font-size:0.85rem;color:var(--text-secondary);">🏢 ${complaint.department}</span>
              </div>
            </div>
            <span style="font-size:0.85rem;color:var(--text-placeholder);font-weight:600;">${complaint.id}</span>
          </div>

          <div class="detail-grid">
            <div class="info-card">
              <h4>📋 Complaint Information</h4>
              <div class="info-row"><span class="info-label">Complaint ID</span><span class="info-value">${complaint.id}</span></div>
              <div class="info-row"><span class="info-label">Department</span><span class="info-value">${complaint.department}</span></div>
              <div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ${complaint.status.toLowerCase().replace(' ','-')}">${complaint.status}</span></span></div>
              <div class="info-row"><span class="info-label">Priority</span><span class="info-value"><span class="priority-badge ${complaint.priority.toLowerCase()}">${complaint.priority}</span></span></div>
              <div class="info-row"><span class="info-label">Date Filed</span><span class="info-value">${complaint.date}</span></div>
            </div>
            <div class="info-card">
              <h4>👤 Citizen Information</h4>
              <div class="info-row"><span class="info-label">Name</span><span class="info-value">${complaint.citizen}</span></div>
              <div class="info-row"><span class="info-label">Citizen ID</span><span class="info-value">${complaint.citizenId}</span></div>
              <div style="margin-top:16px;">
                <div style="font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">Description</div>
                <div class="description-box">${complaint.description}</div>
              </div>
            </div>
          </div>

          <!-- Assign Officer Section -->
          <div class="assign-section">
            <h4>👮 Assign Officer</h4>
            ${assignedOfficer ? `
              <div style="margin-bottom:16px;">
                <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;font-weight:500;">Currently Assigned:</div>
                <div class="assigned-officer">
                  <div class="assigned-avatar">${assignedOfficer.name.split(' ').map(n=>n[0]).join('')}</div>
                  <div class="assigned-info">
                    <div class="name">${assignedOfficer.name}</div>
                    <div class="dept">${assignedOfficer.designation} • ${assignedOfficer.department}</div>
                    <div class="dept">📧 ${assignedOfficer.email} • 📞 ${assignedOfficer.phone}</div>
                  </div>
                  <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="unassignOfficer()">Unassign</button>
                </div>
              </div>
            ` : ''}
            <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;font-weight:500;">${assignedOfficer ? 'Reassign to different officer:' : 'Select an officer to handle this complaint:'}</div>
            <div class="assign-form">
              <div class="form-group">
                <label>Department</label>
                <select id="assign-dept" onchange="filterOfficers()">
                  <option value="${complaint.department}">${complaint.department}</option>
                  ${DEPARTMENTS.filter(d => d !== complaint.department).map(d => `<option value="${d}">${d}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Officer</label>
                <select id="assign-officer">
                  ${deptOfficers.filter(o => o.status === 'Active').map(o => `<option value="${o.id}">${o.name} — ${o.designation}</option>`).join('')}
                  ${deptOfficers.filter(o => o.status === 'Active').length === 0 ? '<option value="">No active officers available</option>' : ''}
                </select>
              </div>
              <button class="btn btn-primary btn-sm" onclick="assignOfficer()" style="height:42px;">✅ Assign</button>
            </div>
          </div>

          <!-- Status Update -->
          <div class="status-update-section">
            <h4>📌 Update Status</h4>
            <div class="status-btns">
              <button class="status-btn ${complaint.status === 'Pending' ? 'active-status' : ''}" onclick="updateStatus('Pending')">⏳ Pending</button>
              <button class="status-btn ${complaint.status === 'In Progress' ? 'active-status' : ''}" onclick="updateStatus('In Progress')">🔄 In Progress</button>
              <button class="status-btn ${complaint.status === 'Resolved' ? 'active-status' : ''}" onclick="updateStatus('Resolved')">✅ Resolved</button>
              <button class="status-btn ${complaint.status === 'Rejected' ? 'active-status' : ''}" onclick="updateStatus('Rejected')">❌ Rejected</button>
            </div>
          </div>

          <!-- Timeline -->
          <div class="timeline">
            <h4>📅 Activity Timeline</h4>
            <div class="timeline-item">
              <div class="timeline-dot orange"></div>
              <div class="timeline-content">
                <div class="event">Complaint Filed</div>
                <div class="time">${complaint.date} — Filed by ${complaint.citizen}</div>
              </div>
            </div>
            ${assignedOfficer ? `
            <div class="timeline-item">
              <div class="timeline-dot blue"></div>
              <div class="timeline-content">
                <div class="event">Assigned to ${assignedOfficer.name}</div>
                <div class="time">${complaint.date} — Assigned by Admin</div>
              </div>
            </div>` : ''}
            ${complaint.status === 'In Progress' ? `
            <div class="timeline-item">
              <div class="timeline-dot blue"></div>
              <div class="timeline-content">
                <div class="event">Status changed to In Progress</div>
                <div class="time">${complaint.date} — Updated by officer</div>
              </div>
            </div>` : ''}
            ${complaint.status === 'Resolved' ? `
            <div class="timeline-item">
              <div class="timeline-dot green"></div>
              <div class="timeline-content">
                <div class="event">Complaint Resolved</div>
                <div class="time">${complaint.date} — Resolved successfully</div>
              </div>
            </div>` : ''}
          </div>
        `;
      }

      window.filterOfficers = function() {
        const dept = document.getElementById('assign-dept').value;
        const officers = DEMO_OFFICERS.filter(o => o.department === dept && o.status === 'Active');
        document.getElementById('assign-officer').innerHTML = officers.length > 0
          ? officers.map(o => `<option value="${o.id}">${o.name} — ${o.designation}</option>`).join('')
          : '<option value="">No active officers available</option>';
      };

      window.assignOfficer = function() {
        const officerId = document.getElementById('assign-officer').value;
        if (!officerId) { alert('Please select an officer first.'); return; }
        const officer = DEMO_OFFICERS.find(o => o.id === officerId);
        assignedOfficer = officer;
        if (complaint.status === 'Pending') complaint.status = 'In Progress';
        alert(`✅ Complaint assigned to ${officer.name} successfully!`);
        renderPage();
      };

      window.unassignOfficer = function() {
        if (!confirm('Unassign this officer from the complaint?')) return;
        assignedOfficer = null;
        renderPage();
      };

      window.updateStatus = function(status) {
        complaint.status = status;
        renderPage();
      };

      renderPage();
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('admin-profile').contains(e.target))
        document.getElementById('profile-dropdown').classList.remove('show');
    });
  </script>
</body>
</html>
