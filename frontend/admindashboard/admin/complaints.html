<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFix Admin - Complaints</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">C</div><div class="sidebar-brand">City<span>Fix</span></div></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> Complaints <span class="badge">18</span></a>
        <a href="officers.html" class="sidebar-link"><span class="icon">👮</span> Officers</a>
        <a href="citizens.html" class="sidebar-link"><span class="icon">👥</span> Citizens</a>
        <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
        <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
      </nav>
      <div class="sidebar-footer"><a href="../auth.html" class="sidebar-link"><span class="icon">🚪</span> Logout</a></div>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left"><h1>Complaints</h1><span class="breadcrumb">All Complaints Management</span></div>
        <div class="topbar-right">
          <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
          <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
            <div class="admin-avatar">AD</div>
            <div class="admin-info"><div class="name">Admin User</div><div class="role">Administrator</div></div>
            <div class="profile-dropdown" id="profile-dropdown">
              <a href="#">👤 My Profile</a><a href="../auth.html">🚪 Logout</a>
            </div>
          </div>
        </div>
      </header>
      <div class="page-content">
        <div class="filter-bar">
          <label>📅 Time:</label>
          <select id="time-filter" onchange="renderComplaints()">
            <option value="all">All Time</option><option value="today">Today</option><option value="this-week">This Week</option>
            <option value="this-month">This Month</option><option value="last-6-months">Last 6 Months</option><option value="last-year">Last Year</option>
          </select>
          <label>📌 Status:</label>
          <select id="status-filter" onchange="renderComplaints()">
            <option value="all">All</option><option value="Pending">Pending</option><option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option><option value="Rejected">Rejected</option>
          </select>
          <label>🏢 Dept:</label>
          <select id="dept-filter" onchange="renderComplaints()"></select>
          <div class="search-box" style="margin-left:auto;">
            <span>🔍</span><input type="text" id="search-input" placeholder="Search complaints..." oninput="renderComplaints()">
          </div>
        </div>
        <div class="section-card">
          <div class="section-card-header"><h3 id="complaints-count">📋 All Complaints (0)</h3></div>
          <div class="section-card-body">
            <table class="data-table"><thead><tr><th>ID</th><th>Title</th><th>Citizen</th><th>Department</th><th>Status</th><th>Priority</th><th>Date</th></tr></thead>
              <tbody id="complaints-body"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/demo-data.js"></script>
  <script>
    // Populate dept filter
    const deptSel = document.getElementById('dept-filter');
    deptSel.innerHTML = '<option value="all">All Departments</option>' + DEPARTMENTS.map(d => `<option value="${d}">${d}</option>`).join('');
    function showDetail(id) {
      window.location.href = 'complaint-detail.html?id=' + id;
    }
    function renderComplaints() {
      let data = [...DEMO_COMPLAINTS];
      const tf = document.getElementById('time-filter').value;
      const sf = document.getElementById('status-filter').value;
      const df = document.getElementById('dept-filter').value;
      const q = document.getElementById('search-input').value.toLowerCase();
      data = filterByTime(data, 'date', tf);
      if (sf !== 'all') data = data.filter(c => c.status === sf);
      if (df !== 'all') data = data.filter(c => c.department === df);
      if (q) data = data.filter(c => c.title.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || c.citizen.toLowerCase().includes(q));
      document.getElementById('complaints-count').textContent = `📋 All Complaints (${data.length})`;
      document.getElementById('complaints-body').innerHTML = data.map(c => `
        <tr onclick="showDetail('${c.id}')"><td><strong>${c.id}</strong></td><td>${c.title}</td><td>${c.citizen}</td><td>${c.department}</td>
        <td><span class="status-badge ${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></td>
        <td><span class="priority-badge ${c.priority.toLowerCase()}">${c.priority}</span></td><td>${c.date}</td></tr>`).join('');
    }
    renderComplaints();
    document.addEventListener('click', e => { if (!document.getElementById('admin-profile').contains(e.target)) document.getElementById('profile-dropdown').classList.remove('show'); });
  </script>
</body>
</html>
