<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFix Admin - Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">C</div>
        <div class="sidebar-brand">City<span>Fix</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"><span class="icon">📊</span> Dashboard</a>
        <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints <span class="badge">18</span></a>
        <a href="officers.html" class="sidebar-link"><span class="icon">👮</span> Officers</a>
        <a href="citizens.html" class="sidebar-link"><span class="icon">👥</span> Citizens</a>
        <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
        <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth.html" class="sidebar-link"><span class="icon">🚪</span> Logout</a>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1>Dashboard</h1>
          <span class="breadcrumb">Overview & Analytics</span>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
          <div class="admin-profile" id="admin-profile" onclick="toggleProfileMenu()">
            <div class="admin-avatar">AD</div>
            <div class="admin-info">
              <div class="name">Admin User</div>
              <div class="role">Administrator</div>
            </div>
            <div class="profile-dropdown" id="profile-dropdown">
              <a href="#" onclick="event.stopPropagation()">👤 My Profile</a>
              <a href="../auth.html" onclick="event.stopPropagation()">🚪 Logout</a>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <!-- Filters -->
        <div class="filter-bar" id="dashboard-filters">
          <label>📅 Filter:</label>
          <select id="time-filter" onchange="renderDashboard()">
            <option value="all">All Time</option>
            <option value="today">Today</option>
            <option value="this-month" selected>This Month</option>
            <option value="this-year">This Year</option>
          </select>
          <label style="margin-left:12px">📆 From:</label>
          <input type="date" id="date-from" style="padding:8px 12px;border-radius:8px;border:2px solid var(--card-border);background:var(--input-bg);font-family:Inter;font-size:0.85rem;color:var(--text-primary);" onchange="renderDashboard()">
          <label>To:</label>
          <input type="date" id="date-to" style="padding:8px 12px;border-radius:8px;border:2px solid var(--card-border);background:var(--input-bg);font-family:Inter;font-size:0.85rem;color:var(--text-primary);" onchange="renderDashboard()">
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid"></div>

        <!-- Recent Complaints -->
        <div class="section-card">
          <div class="section-card-header">
            <h3>📋 Recent Complaints</h3>
            <a href="complaints.html" class="btn btn-sm btn-outline">View All</a>
          </div>
          <div class="section-card-body">
            <table class="data-table" id="recent-complaints-table">
              <thead>
                <tr>
                  <th>ID</th><th>Title</th><th>Citizen</th><th>Department</th><th>Status</th><th>Priority</th><th>Date</th>
                </tr>
              </thead>
              <tbody id="recent-complaints-body"></tbody>
            </table>
            <a href="complaints.html" class="view-more">View All Complaints →</a>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="../js/demo-data.js"></script>
  <script>
    function toggleProfileMenu() {
      document.getElementById('profile-dropdown').classList.toggle('show');
    }
    document.addEventListener('click', (e) => {
      if (!document.getElementById('admin-profile').contains(e.target)) {
        document.getElementById('profile-dropdown').classList.remove('show');
      }
    });

    function showComplaintDetail(id) {
      window.location.href = 'complaint-detail.html?id=' + id;
    }

    function renderDashboard() {
      const filter = document.getElementById('time-filter').value;
      const dateFrom = document.getElementById('date-from').value;
      const dateTo = document.getElementById('date-to').value;

      let filtered = [...DEMO_COMPLAINTS];
      if (dateFrom && dateTo) {
        const from = new Date(dateFrom), to = new Date(dateTo);
        filtered = filtered.filter(c => { const d = new Date(c.date); return d >= from && d <= to; });
      } else {
        filtered = filterByTime(filtered, 'date', filter);
      }

      const total = filtered.length;
      const pending = filtered.filter(c => c.status === 'Pending').length;
      const inProgress = filtered.filter(c => c.status === 'In Progress').length;
      const resolved = filtered.filter(c => c.status === 'Resolved').length;
      const critical = filtered.filter(c => c.priority === 'Critical').length;

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card blue"><div class="stat-card-header"><div class="stat-card-icon blue">📋</div></div><div class="stat-value">${total}</div><div class="stat-label">Total Complaints</div></div>
        <div class="stat-card orange"><div class="stat-card-header"><div class="stat-card-icon orange">⏳</div></div><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
        <div class="stat-card purple"><div class="stat-card-header"><div class="stat-card-icon purple">🔄</div></div><div class="stat-value">${inProgress}</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card green"><div class="stat-card-header"><div class="stat-card-icon green">✅</div></div><div class="stat-value">${resolved}</div><div class="stat-label">Resolved</div></div>
        <div class="stat-card red"><div class="stat-card-header"><div class="stat-card-icon red">🚨</div></div><div class="stat-value">${critical}</div><div class="stat-label">Critical Issues</div></div>`;

      const recent = filtered.slice(0, 6);
      document.getElementById('recent-complaints-body').innerHTML = recent.map(c => `
        <tr onclick="showComplaintDetail('${c.id}')">
          <td><strong>${c.id}</strong></td>
          <td>${c.title}</td>
          <td>${c.citizen}</td>
          <td>${c.department}</td>
          <td><span class="status-badge ${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></td>
          <td><span class="priority-badge ${c.priority.toLowerCase()}">${c.priority}</span></td>
          <td>${c.date}</td>
        </tr>`).join('');
    }

    renderDashboard();
  </script>
</body>
</html>
