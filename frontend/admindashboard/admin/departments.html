<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFix Admin - Departments</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">C</div><div class="sidebar-brand">City<span>Fix</span></div></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
        <a href="officers.html" class="sidebar-link"><span class="icon">👮</span> Officers</a>
        <a href="citizens.html" class="sidebar-link"><span class="icon">👥</span> Citizens</a>
        <a href="departments.html" class="sidebar-link active"><span class="icon">🏢</span> Departments</a>
        <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
      </nav>
      <div class="sidebar-footer"><a href="../auth.html" class="sidebar-link"><span class="icon">🚪</span> Logout</a></div>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left"><h1 id="page-title">Departments</h1><span class="breadcrumb" id="page-breadcrumb">All Departments</span></div>
        <div class="topbar-right">
          <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
          <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
            <div class="admin-avatar">AD</div>
            <div class="admin-info"><div class="name">Admin User</div><div class="role">Administrator</div></div>
            <div class="profile-dropdown" id="profile-dropdown"><a href="#">👤 My Profile</a><a href="../auth.html">🚪 Logout</a></div>
          </div>
        </div>
      </header>
      <div class="page-content">
        <!-- Department List View -->
        <div id="dept-list-view">
          <div class="dept-grid" id="dept-grid"></div>
        </div>
        <!-- Department Detail View -->
        <div id="dept-detail-view" class="hidden">
          <button class="btn btn-outline btn-sm" onclick="showDeptList()" style="margin-bottom:20px;">← Back to Departments</button>
          <div class="stats-grid" id="dept-stats"></div>
          <div class="filter-bar">
            <label>📅 Time:</label>
            <select id="dept-time-filter" onchange="renderDeptComplaints()">
              <option value="all">All Time</option><option value="today">Today</option><option value="this-month">This Month</option><option value="this-year">This Year</option>
            </select>
            <label>📌 Status:</label>
            <select id="dept-status-filter" onchange="renderDeptComplaints()">
              <option value="all">All</option><option value="Pending">Pending</option><option value="In Progress">In Progress</option><option value="Resolved">Resolved</option>
            </select>
          </div>
          <div class="section-card">
            <div class="section-card-header"><h3 id="dept-complaints-title">Complaints</h3></div>
            <div class="section-card-body">
              <table class="data-table"><thead><tr><th>ID</th><th>Title</th><th>Citizen</th><th>Status</th><th>Priority</th><th>Date</th></tr></thead>
                <tbody id="dept-complaints-body"></tbody></table>
            </div>
          </div>
          <div class="section-card">
            <div class="section-card-header"><h3>Officers in this Department</h3></div>
            <div class="section-card-body">
              <table class="data-table"><thead><tr><th>Name</th><th>Designation</th><th>Status</th><th>Cases</th></tr></thead>
                <tbody id="dept-officers-body"></tbody></table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/demo-data.js"></script>
  <script>
    let selectedDept = null;
    function renderDeptGrid() {
      document.getElementById('dept-grid').innerHTML = DEPARTMENTS.map(dept => {
        const complaints = DEMO_COMPLAINTS.filter(c => c.department === dept);
        const officers = DEMO_OFFICERS.filter(o => o.department === dept);
        const resolved = complaints.filter(c => c.status === 'Resolved').length;
        const pending = complaints.filter(c => c.status === 'Pending').length;
        return `<div class="dept-card" onclick="showDeptDetail('${dept}')">
          <h4>🏢 ${dept}</h4>
          <div class="dept-stat"><span class="label">Total Complaints</span><span class="value">${complaints.length}</span></div>
          <div class="dept-stat"><span class="label">Resolved</span><span class="value" style="color:var(--success)">${resolved}</span></div>
          <div class="dept-stat"><span class="label">Pending</span><span class="value" style="color:var(--accent)">${pending}</span></div>
          <div class="dept-stat"><span class="label">Officers</span><span class="value">${officers.length}</span></div>
          <div class="dept-stat"><span class="label">Active Officers</span><span class="value" style="color:var(--success)">${officers.filter(o=>o.status==='Active').length}</span></div>
        </div>`;
      }).join('');
    }
    function showDeptDetail(dept) {
      selectedDept = dept;
      document.getElementById('dept-list-view').classList.add('hidden');
      document.getElementById('dept-detail-view').classList.remove('hidden');
      document.getElementById('page-title').textContent = dept;
      document.getElementById('page-breadcrumb').textContent = 'Department Overview';
      const complaints = DEMO_COMPLAINTS.filter(c => c.department === dept);
      const officers = DEMO_OFFICERS.filter(o => o.department === dept);
      const total = complaints.length, resolved = complaints.filter(c=>c.status==='Resolved').length;
      const pending = complaints.filter(c=>c.status==='Pending').length, ip = complaints.filter(c=>c.status==='In Progress').length;
      document.getElementById('dept-stats').innerHTML = `
        <div class="stat-card blue"><div class="stat-card-header"><div class="stat-card-icon blue">📋</div></div><div class="stat-value">${total}</div><div class="stat-label">Total Complaints</div></div>
        <div class="stat-card green"><div class="stat-card-header"><div class="stat-card-icon green">✅</div></div><div class="stat-value">${resolved}</div><div class="stat-label">Resolved</div></div>
        <div class="stat-card orange"><div class="stat-card-header"><div class="stat-card-icon orange">⏳</div></div><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
        <div class="stat-card purple"><div class="stat-card-header"><div class="stat-card-icon purple">🔄</div></div><div class="stat-value">${ip}</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card blue"><div class="stat-card-header"><div class="stat-card-icon blue">👮</div></div><div class="stat-value">${officers.length}</div><div class="stat-label">Total Officers</div></div>`;
      document.getElementById('dept-officers-body').innerHTML = officers.map(o => `
        <tr onclick="window.location.href='officer-detail.html?id=${o.id}'"><td>${o.name}</td><td>${o.designation}</td><td><span class="status-badge ${o.status.toLowerCase().replace(' ','-')}">${o.status}</span></td><td>${o.casesResolved}/${o.casesHandled}</td></tr>`).join('') || '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-secondary);">No officers in this department</td></tr>';
      renderDeptComplaints();
    }
    function renderDeptComplaints() {
      let data = DEMO_COMPLAINTS.filter(c => c.department === selectedDept);
      const tf = document.getElementById('dept-time-filter').value;
      const sf = document.getElementById('dept-status-filter').value;
      data = filterByTime(data, 'date', tf);
      if (sf !== 'all') data = data.filter(c => c.status === sf);
      document.getElementById('dept-complaints-title').textContent = `Complaints (${data.length})`;
      document.getElementById('dept-complaints-body').innerHTML = data.map(c => `
        <tr onclick="window.location.href='complaint-detail.html?id=${c.id}'"><td><strong>${c.id}</strong></td><td>${c.title}</td><td>${c.citizen}</td>
        <td><span class="status-badge ${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></td>
        <td><span class="priority-badge ${c.priority.toLowerCase()}">${c.priority}</span></td><td>${c.date}</td></tr>`).join('')
        || '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-secondary);">No complaints found</td></tr>';
    }
    function showDeptList() {
      selectedDept = null;
      document.getElementById('dept-detail-view').classList.add('hidden');
      document.getElementById('dept-list-view').classList.remove('hidden');
      document.getElementById('page-title').textContent = 'Departments';
      document.getElementById('page-breadcrumb').textContent = 'All Departments';
    }
    renderDeptGrid();
    document.addEventListener('click', e => { if (!document.getElementById('admin-profile').contains(e.target)) document.getElementById('profile-dropdown').classList.remove('show'); });
  </script>
</body>
</html>
